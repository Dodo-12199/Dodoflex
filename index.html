<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodoflex | Ultimate Player</title>
    <style>
        :root { --primary: #e50914; --bg: #000; --card: #181818; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 5%; background: rgba(0,0,0,0.9); align-items: center; position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; }
        .search-container { padding: 85px 5% 10px 5%; background: var(--bg); }
        #searchBar { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #222; color: white; outline: none; font-size: 1rem; box-sizing: border-box; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor:pointer; }
        .content { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; position: relative; height: 220px; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-actions { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 5px; }
        .fav-btn { background: rgba(0,0,0,0.7); color: white; border: none; padding: 5px; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 0.9rem; }
        .card-title { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 8px 0; text-align: center; font-size: 0.8rem; }
        #adminForm { display: none; background: #181818; padding: 20px; border-bottom: 2px solid var(--primary); padding-top: 80px;}
        input { width: 100%; padding: 12px; margin: 5px 0; background: #222; color: white; border: 1px solid #333; box-sizing: border-box; border-radius: 4px; }
        
        /* OVERLAY PLAYER UNIVERSEL */
        #playerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .close-p { position: absolute; top: 20px; right: 20px; color: white; font-size: 1.5rem; z-index: 2100; cursor: pointer; background: rgba(255,255,255,0.2); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .video-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DODOFLEX</div>
        <button class="add-btn" onclick="toggleForm()">+ AJOUTER</button>
    </nav>

    <div id="adminForm">
        <input type="text" id="mT" placeholder="Titre du film">
        <input type="text" id="mI" placeholder="Lien de l'image (Affiche)">
        <input type="text" id="mV" placeholder="Lien Vidéo (YouTube, Twitch, MP4, etc.)">
        <button onclick="addMovie()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; margin-top:10px; font-weight:bold; border-radius:5px;">PUBLIER SUR MON SITE</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Rechercher dans ma bibliothèque..." onkeyup="searchMovies()">
    </div>

    <main class="content">
        <div id="favoritesSection" style="display:none;">
            <h3>Ma Liste ❤️</h3>
            <div class="grid" id="favGrid"></div>
        </div>
        <h3 id="gridTitle">Tous les films</h3>
        <div class="grid" id="movieGrid"></div>
    </main>

    <div id="playerOverlay">
        <div class="close-p" onclick="closeP()">✕</div>
        <div id="videoContainer" class="video-wrapper"></div>
    </div>

    <script>
        let myLibrary = JSON.parse(localStorage.getItem('dodo_lib')) || [];
        let myFavs = JSON.parse(localStorage.getItem('dodo_favs')) || [];

        function renderAll(data = myLibrary) {
            renderGrid(data, 'movieGrid');
            const favSec = document.getElementById('favoritesSection');
            if(myFavs.length > 0 && data.length === myLibrary.length) {
                favSec.style.display = "block";
                renderGrid(myFavs, 'favGrid', true);
            } else { favSec.style.display = "none"; }
            localStorage.setItem('dodo_lib', JSON.stringify(myLibrary));
            localStorage.setItem('dodo_favs', JSON.stringify(myFavs));
        }

        function renderGrid(list, elementId, isFavGrid = false) {
            const grid = document.getElementById(elementId);
            grid.innerHTML = list.map((m, i) => {
                const isFavorite = myFavs.some(f => f.t === m.t);
                const realIndex = myLibrary.findIndex(movie => movie.t === m.t);
                return `
                    <div class="card">
                        <img src="${m.img}" onclick="openP('${m.vid}')">
                        <div class="card-actions">
                            <button class="fav-btn" onclick="toggleFav('${m.t}')">${isFavorite ? '❤️' : '🤍'}</button>
                            ${!isFavGrid ? `<button class="fav-btn" onclick="deleteMovie(${realIndex})">🗑️</button>` : ''}
                        </div>
                        <div class="card-title">${m.t}</div>
                    </div>
                `;
            }).join('');
        }

        function addMovie() {
            const t = document.getElementById('mT').value;
            const i = document.getElementById('mI').value;
            let v = document.getElementById('mV').value;

            // NETTOYAGE AUTOMATIQUE DES LIENS
            if(v.includes("youtube.com/watch?v=")) v = v.replace("watch?v=", "embed/");
            if(v.includes("youtu.be/")) v = v.replace("youtu.be/", "youtube.com/embed/");
            if(v.includes("vimeo.com/")) v = v.replace("vimeo.com/", "player.vimeo.com/video/");

            if(t && i && v) {
                myLibrary.unshift({ t, img: i, vid: v });
                renderAll(); toggleForm();
                document.getElementById('mT').value = ""; document.getElementById('mI').value = ""; document.getElementById('mV').value = "";
            } else { alert("Remplis toutes les cases !"); }
        }

        function openP(url) {
            const container = document.getElementById('videoContainer');
            const overlay = document.getElementById('playerOverlay');
            
            // SI C'EST UN LIEN "EMBED" (YouTube, Vimeo, etc.)
            if(url.includes("embed") || url.includes("player.")) {
                container.innerHTML = `<iframe src="${url}?autoplay=1" style="width:100%; height:100%;" allow="autoplay; fullscreen" frameborder="0"></iframe>`;
            } 
            // SI C'EST UN FICHIER DIRECT (.mp4, .webm)
            else {
                container.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%; max-height:100%;"></video>`;
            }
            overlay.style.display = "flex";
        }

        function closeP() {
            document.getElementById('playerOverlay').style.display = "none";
            document.getElementById('videoContainer').innerHTML = "";
        }

        function searchMovies() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = myLibrary.filter(m => m.t.toLowerCase().includes(term));
            renderAll(filtered);
        }

        function toggleFav(title) {
            const index = myFavs.findIndex(f => f.t === title);
            if(index > -1) { myFavs.splice(index, 1); } 
            else { const movie = myLibrary.find(m => m.t === title); myFavs.unshift(movie); }
            renderAll();
        }

        function toggleForm() { 
            const f = document.getElementById('adminForm');
            f.style.display = (f.style.display === "block") ? "none" : "block";
        }

        function deleteMovie(i) {
            if(confirm("Supprimer ce film ?")) { myLibrary.splice(i,1); renderAll(); }
        }

        renderAll();
    </script>
</body>
</html>
