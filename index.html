<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodoflex | Catalogue Public</title>
    <style>
        :root { --primary: #e50914; --bg: #141414; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: white; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 5%; background: #000; position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; align-items: center; border-bottom: 1px solid #333; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; }
        .hero { height: 30vh; background: linear-gradient(transparent, var(--bg)), #222; display: flex; align-items: flex-end; padding: 0 5% 20px 5%; }
        .content { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #181818; border-radius: 8px; overflow: hidden; position: relative; height: 250px; cursor: pointer; border: 1px solid #333; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px 0; text-align: center; font-size: 0.9rem; font-weight: bold; }
        #playerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .close-p { position: absolute; top: 20px; left: 20px; color: white; font-size: 2rem; cursor: pointer; z-index: 2100; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DODOFLEX</div>
        <div style="font-size: 0.8rem; color: gray;">Catalogue Officiel</div>
    </nav>

    <div class="hero">
        <h1>Films & Séries</h1>
    </div>

    <main class="content">
        <div class="grid" id="movieGrid"></div>
    </main>

    <div id="playerOverlay">
        <div class="close-p" onclick="closeP()">✕</div>
        <div id="videoContainer" style="width:100%; height:100%; display:flex; align-items:center;"></div>
    </div>

    <script>
        // --- C'EST ICI QUE TU AJOUTES TES FILMS POUR TOUT LE MONDE ---
        // Recopie le modèle : { t: "Titre", img: "Lien Image", vid: "Lien Vidéo" },
        const myLibrary = [
            { 
                t: "Exemple de film", 
                img: "https://picsum.photos/400/600", 
                vid: "https://www.w3schools.com/html/mov_bbb.mp4" 
            },
            { 
                t: "Titre du 2ème Film", 
                img: "Lien_De_Ton_Image_Ici", 
                vid: "Lien_De_Ta_Video_Ici" 
            }
        ];

        function renderAll() {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = myLibrary.map((m) => `
                <div class="card" onclick="playV('${m.vid}')">
                    <img src="${m.img}">
                    <div class="card-title">${m.t}</div>
                </div>
            `).join('');
        }

        function playV(url) {
            const container = document.getElementById('videoContainer');
            if(url.includes("watch?v=")) url = url.replace("watch?v=", "embed/");
            if(url.includes("youtu.be/")) url = url.replace("youtu.be/", "youtube.com/embed/");
            
            if(url.includes("embed") || url.includes("google.com")) {
                container.innerHTML = `<iframe src="${url}?autoplay=1" style="width:100%; height:85%; border:none;" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video src="${url}" controls autoplay style="width:100%;"></video>`;
            }
            document.getElementById('playerOverlay').style.display = 'block';
        }

        function closeP() { 
            document.getElementById('playerOverlay').style.display = 'none'; 
            document.getElementById('videoContainer').innerHTML = ""; 
        }

        renderAll();
    </script>
</body>
</html>
