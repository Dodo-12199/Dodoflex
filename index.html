<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodoflex</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* Navbar invisible qui devient noire */
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; z-index: 100; transition: 0.5s; box-sizing: border-box; }
        .logo { color: #e50914; font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        .add-icon { font-size: 24px; cursor: pointer; color: #fff; background: none; border: none; }

        /* Bannière principale */
        .banner { height: 500px; background: linear-gradient(to top, #111, transparent), url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070') center/cover; display: flex; align-items: flex-end; padding: 0 4% 40px 4%; }
        .banner-title { font-size: 40px; margin: 0; font-weight: bold; }

        /* Liste de films */
        .section { padding: 20px 4%; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #e5e5e5; }
        .list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        
        .movie-card { position: relative; cursor: pointer; transition: 0.3s; border-radius: 4px; overflow: hidden; height: 210px; }
        .movie-card:hover { transform: scale(1.05); z-index: 2; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .movie-name { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; text-align: center; padding: 5px 0; font-size: 12px; }

        /* Formulaire discret */
        #form { display: none; position: fixed; top: 70px; right: 4%; background: #222; padding: 20px; border-radius: 8px; z-index: 200; width: 280px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .btn-send { width: 100%; background: #e50914; color: #fff; border: none; padding: 10px; border-radius: 4px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Lecteur */
        #player { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; }
        .close { position:absolute; top:20px; right:20px; font-size:30px; cursor:pointer; z-index:1001; }
    </style>
</head>
<body>

    <div class="header" id="nav">
        <div class="logo">DODOFLEX</div>
        <button class="add-icon" onclick="toggleForm()">+</button>
    </div>

    <div id="form">
        <input type="text" id="t" placeholder="Titre">
        <input type="text" id="i" placeholder="Lien image">
        <input type="text" id="v" placeholder="Lien vidéo">
        <button class="btn-send" onclick="add()">Ajouter au catalogue</button>
    </div>

    <div class="banner">
        <div class="banner-title">Catalogue Personnel</div>
    </div>

    <div class="section">
        <div class="section-title">Mes Vidéos</div>
        <div class="list" id="grid"></div>
    </div>

    <div id="player">
        <div class="close" onclick="closeP()">✕</div>
        <div id="vidCont" style="width:100%; height:100%; display:flex; align-items:center;"></div>
    </div>

    <script>
        let movies = JSON.parse(localStorage.getItem('dodo_list')) || [];

        function show() {
            const grid = document.getElementById('grid');
            grid.innerHTML = movies.map((m, i) => `
                <div class="movie-card" onclick="play('${m.v}')" oncontextmenu="del(${i}); return false;">
                    <img src="${m.i}">
                    <div class="movie-name">${m.t}</div>
                </div>
            `).join('');
            localStorage.setItem('dodo_list', JSON.stringify(movies));
        }

        function add() {
            const t = document.getElementById('t').value;
            const i = document.getElementById('i').value;
            const v = document.getElementById('v').value;
            if(t && i && v) {
                movies.unshift({t, i, v});
                show();
                toggleForm();
            }
        }

        function play(url) {
            const cont = document.getElementById('vidCont');
            if(url.includes("watch?v=")) url = url.replace("watch?v=", "embed/");
            if(url.includes("youtu.be/")) url = url.replace("youtu.be/", "youtube.com/embed/");
            
            if(url.includes("embed") || url.includes("google.com")) {
                cont.innerHTML = `<iframe src="${url}" style="width:100%; height:80%; border:none;" allowfullscreen></iframe>`;
            } else {
                cont.innerHTML = `<video src="${url}" controls autoplay style="width:100%;"></video>`;
            }
            document.getElementById('player').style.display = 'block';
        }

        function closeP() { document.getElementById('player').style.display = 'none'; document.getElementById('vidCont').innerHTML = ""; }
        function toggleForm() { const f = document.getElementById('form'); f.style.display = (f.style.display == 'block' ? 'none' : 'block'); }
        function del(i) { if(confirm("Supprimer ?")) { movies.splice(i,1); show(); } }

        window.onscroll = () => { document.getElementById('nav').style.background = window.scrollY > 50 ? '#111' : 'transparent'; };

        show();
    </script>
</body>
</html>
