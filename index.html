<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dodoflex Pro</title>
    <style>
        :root { --primary: #e50914; --bg: #000; --card-bg: #141414; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Navbar */
        .nav { display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; }
        .logo-box { display: flex; flex-direction: column; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; letter-spacing: 1px; text-decoration: none; }
        .grade { color: #aaa; font-size: 0.7rem; font-weight: bold; margin-top: 2px; text-transform: uppercase; }
        .grade.pro { color: var(--gold); }
        #btnVip { color: var(--gold); font-size: 0.6rem; border: 1px solid var(--gold); padding: 2px 5px; border-radius: 3px; margin-top: 5px; background: none; cursor: pointer; width: fit-content; font-weight: bold; }

        .btn-plus { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 5px; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Panel Admin */
        #admin { display: none; background: #1a1a1a; padding: 20px 5%; border-bottom: 2px solid var(--primary); }
        .admin-box { border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #222; }
        h3 { margin: 0 0 10px 0; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #333; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }

        /* Hero */
        .hero { padding: 80px 5% 40px 5%; background-size: cover; background-position: center; min-height: 350px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; transition: 0.3s; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, var(--bg)); }
        .hero-content { position: relative; z-index: 2; }
        .hero h1 { font-size: 2.5rem; margin: 0; text-shadow: 2px 2px 15px rgba(0,0,0,1); }
        .btn-play { background: white; color: black; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; margin-top: 20px; width: fit-content; font-size: 1.1rem; cursor: pointer; }

        /* Filtres */
        .search-area { padding: 20px 5% 0 5%; }
        #search { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #141414; color: white; box-sizing: border-box; }
        .cats { display: flex; gap: 10px; padding: 15px 5%; overflow-x: auto; scrollbar-width: none; }
        .cat-btn { background: #333; color: white; border: none; padding: 10px 25px; border-radius: 20px; white-space: nowrap; font-weight: bold; cursor: pointer; }
        .cat-btn.active { background: var(--primary); }
        #catVip { display: none; border: 1px solid var(--gold); color: var(--gold); } 

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 5% 100px 5%; }
        .card { background: var(--card-bg); border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid #222; position: relative; }
        .card img { width: 100%; height: 240px; object-fit: cover; display: block; }
        .card-t { padding: 10px; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .badge-vip { position: absolute; top: 5px; right: 5px; background: var(--gold); color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        /* Player */
        #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .close { position: absolute; top: 25px; left: 25px; font-size: 2rem; color: white; z-index: 10001; background: rgba(0,0,0,0.6); width: 45px; height: 45px; text-align: center; line-height: 45px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="admin">
        <div class="admin-box">
            <h3>🎬 Ajouter un Film</h3>
            <input type="text" id="t" placeholder="Titre">
            <input type="text" id="i" placeholder="URL Image">
            <input type="text" id="v" placeholder="Lien Vidéo">
            <select id="c">
                <option value="Action">Action</option>
                <option value="Animé">Animé</option>
                <option value="Horreur">Horreur</option>
                <option value="VIP">💎 EXCLUSIF VIP</option>
            </select>
            <button onclick="save()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">AJOUTER</button>
        </div>
    </div>

    <nav class="nav">
        <div class="logo-box">
            <a href="#" class="logo">DODOFLEX</a>
            <div id="gradeTxt" class="grade">GRADE: MEMBRE</div>
            <button id="btnVip" onclick="activateVip()">ACTIVER VIP</button>
        </div>
        <button class="btn-plus" onclick="askAdmin()">+</button>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-content">
            <h1 id="heroT">Bienvenue</h1>
            <button class="btn-play" onclick="playHero()">▶ Lecture</button>
        </div>
    </header>

    <div class="search-area"><input type="text" id="search" placeholder="Rechercher..." onkeyup="render()"></div>

    <div class="cats">
        <button class="cat-btn active" onclick="filter('Tous', this)">Tous</button>
        <button class="cat-btn" onclick="filter('Action', this)">Action</button>
        <button class="cat-btn" onclick="filter('Animé', this)">Animé</button>
        <button class="cat-btn" onclick="filter('Horreur', this)">Horreur</button>
        <button id="catVip" class="cat-btn" onclick="filter('VIP', this)">💎 VIP</button>
    </div>

    <div class="grid" id="main"></div>

    <div id="player">
        <div class="close" onclick="closeV()">✕</div>
        <div id="vBox" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PASS_ADMIN = "D121028.";
        const MASTER_VIP = "12199"; 

        // Modifie tes codes et dates ici
        const CODES_VIP = [
            { code: "Dodo1234", expire: "2026-03-21 20:00" }
        ];

        let currentCat = "Tous";
        const DEFAUT = [
            {t: "Big Buck Bunny", i: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Big_buck_bunny_poster_big.jpg", v: "https://www.youtube.com/embed/aqz-KE-bpKQ", c: "Action"}
        ];

        function checkStatus() {
            if(localStorage.getItem('isVip') === 'true') {
                document.getElementById('gradeTxt').innerText = "GRADE: PRO ✨";
                document.getElementById('gradeTxt').classList.add('pro');
                document.getElementById('btnVip').style.display = 'none';
                document.getElementById('catVip').style.display = 'block';
            }
        }

        function activateVip() {
            const input = prompt("Code VIP :");
            if(!input) return;

            // Maître
            if(input === MASTER_VIP) {
                localStorage.setItem('isVip', 'true');
                alert("Accès PRO Illimité activé !");
                location.reload();
                return;
            }

            // Temporaire
            const found = CODES_VIP.find(c => c.code === input);
            if(found) {
                const maintenant = new Date();
                const expiration = new Date(found.expire);
                if(maintenant < expiration) {
                    localStorage.setItem('isVip', 'true');
                    alert("VIP Validé jusqu'au " + found.expire);
                    location.reload();
                } else {
                    alert("Désolé, ce code a expiré le " + found.expire);
                }
            } else {
                alert("Code invalide.");
            }
        }

        function render() {
            const list = JSON.parse(localStorage.getItem('dodo_db_v4')) || DEFAUT;
            const s = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('main');
            const isVip = localStorage.getItem('isVip') === 'true';
            container.innerHTML = "";

            if(list.length > 0) {
                document.getElementById('heroT').innerText = list[0].t;
                document.getElementById('hero').style.backgroundImage = `url('${list[0].i}')`;
            }

            const filtered = list.filter(m => (currentCat === "Tous" || m.c === currentCat) && m.t.toLowerCase().includes(s));
            
            filtered.forEach(m => {
                // On cache les films VIP aux non-membres
                if(m.c === "VIP" && !isVip) return; 

                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${m.c === 'VIP' ? '<div class="badge-vip">PRO ✨</div>' : ''}
                    <img src="${m.i}">
                    <div class="card-t">${m.t}</div>
                `;
                div.onclick = () => openV(m.v);
                container.appendChild(div);
            });
        }

        function askAdmin() {
            if(prompt("Pass Admin :") === PASS_ADMIN) {
                const a = document.getElementById('admin');
                a.style.display = (a.style.display === 'block') ? 'none' : 'block';
                window.scrollTo(0,0);
            }
        }

        function save() {
            const t = document.getElementById('t').value, i = document.getElementById('i').value, v = document.getElementById('v').value, c = document.getElementById('c').value;
            if(t && i && v) {
                let list = JSON.parse(localStorage.getItem('dodo_db_v4')) || DEFAUT;
                list.unshift({t, i, v, c});
                localStorage.setItem('dodo_db_v4', JSON.stringify(list));
                location.reload();
            } else { alert("Remplis tout !"); }
        }

        function openV(url) {
            let final = url.includes("watch?v=") ? url.replace("watch?v=", "embed/") : url;
            if(url.includes("youtu.be/")) final = url.replace("youtu.be/", "youtube.com/embed/");
            document.getElementById('vBox').innerHTML = `<iframe src="${final}?autoplay=1" style="width:100%; height:100%; border:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('player').style.display = 'block';
        }

        function closeV() { document.getElementById('player').style.display = 'none'; document.getElementById('vBox').innerHTML = ""; }
        function playHero() { 
            const list = JSON.parse(localStorage.getItem('dodo_db_v4')) || DEFAUT;
            if(list.length > 0) openV(list[0].v); 
        }

        function filter(c, btn) {
            currentCat = c;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        window.onload = () => { checkStatus(); render(); };
    </script>
</body>
</html>
