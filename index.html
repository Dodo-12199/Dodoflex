<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodoflex</title>
    <style>
        :root { --primary: #e50914; --bg: #141414; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* Navbar fixe et propre */
        .navbar { display: flex; justify-content: space-between; padding: 15px 5%; background: rgba(0,0,0,0.85); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; align-items: center; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.8rem; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Grand titre en haut */
        .hero { height: 40vh; background: linear-gradient(rgba(0,0,0,0.2), var(--bg)), url('https://picsum.photos/1200/400?grayscale') center/cover; display: flex; align-items: flex-end; padding: 0 5% 20px 5%; }
        .hero h1 { font-size: 2.5rem; margin: 0; }

        /* Grille des films bien visible */
        .content { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .card { background: #181818; border-radius: 8px; overflow: hidden; position: relative; height: 240px; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 8px 0; text-align: center; font-size: 0.85rem; font-weight: bold; }

        /* Formulaire d'ajout */
        #adminForm { display: none; background: #111; padding: 80px 5% 20px 5%; border-bottom: 2px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #222; color: white; border: 1px solid #333; border-radius: 4px; box-sizing: border-box; }
        
        /* Player */
        #playerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .close-p { position: absolute; top: 20px; left: 20px; color: white; font-size: 2rem; cursor: pointer; z-index: 2100; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DODOFLEX</div>
        <button class="add-btn" onclick="toggleForm()">+ AJOUTER</button>
    </nav>

    <div id="adminForm">
        <input type="text" id="mT" placeholder="Titre du film">
        <input type="text" id="mI" placeholder="Lien de l'image">
        <input type="text" id="mV" placeholder="Lien de la vidéo">
        <button onclick="addMovie()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; margin-top:10px; font-weight:bold; border-radius:4px;">PUBLIER</button>
    </div>

    <div class="hero">
        <h1>Ma Bibliothèque</h1>
    </div>

    <main class="content">
        <h3 id="statusMsg">Vos films :</h3>
        <div class="grid" id="movieGrid"></div>
    </main>

    <div id="playerOverlay">
        <div class="close-p" onclick="closeP()">✕</div>
        <div id="videoContainer" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
    </div>

    <script>
        let myLibrary = JSON.parse(localStorage.getItem('dodo_lib')) || [];

        function renderAll() {
            const grid = document.getElementById('movieGrid');
            if(myLibrary.length === 0) {
                document.getElementById('statusMsg').innerText = "Aucun film ajouté.";
                grid.innerHTML = "";
            } else {
                document.getElementById('statusMsg').innerText = "Nouveautés :";
                grid.innerHTML = myLibrary.map((m, i) => `
                    <div class="card" onclick="playV('${m.vid}')" oncontextmenu="delM(${i}); return false;">
                        <img src="${m.img}">
                        <div class="card-title">${m.t}</div>
                    </div>
                `).join('');
            }
            localStorage.setItem('dodo_lib', JSON.stringify(myLibrary));
        }

        function addMovie() {
            const t = document.getElementById('mT').value;
            const i = document.getElementById('mI').value;
            const v = document.getElementById('mV').value;
            if(t && i && v) {
                myLibrary.unshift({t, img: i, vid: v});
                renderAll(); toggleForm();
                document.getElementById('mT').value = ""; document.getElementById('mI').value = ""; document.getElementById('mV').value = "";
            }
        }

        function playV(url) {
            const container = document.getElementById('videoContainer');
            if(url.includes("watch?v=")) url = url.replace("watch?v=", "embed/");
            if(url.includes("youtu.be/")) url = url.replace("youtu.be/", "youtube.com/embed/");
            
            if(url.includes("embed") || url.includes("google.com")) {
                container.innerHTML = `<iframe src="${url}?autoplay=1" style="width:100%; height:85%; border:none;" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video src="${url}" controls autoplay style="width:100%;"></video>`;
            }
            document.getElementById('playerOverlay').style.display = 'block';
        }

        function closeP() { document.getElementById('playerOverlay').style.display = 'none'; document.getElementById('videoContainer').innerHTML = ""; }
        function toggleForm() { const f = document.getElementById('adminForm'); f.style.display = (f.style.display == 'block' ? 'none' : 'block'); }
        function delM(i) { if(confirm("Supprimer ce film ?")) { myLibrary.splice(i,1); renderAll(); } }

        renderAll();
    </script>
</body>
</html>
